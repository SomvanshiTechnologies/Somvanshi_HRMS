# SomHR — Nginx on the EC2 backend instance.
# In the production topology the SPA is served by CloudFront + S3; this Nginx is
# only the CloudFront *origin* for the API: it terminates :80 and reverse-proxies
# /api and /socket.io to the Node process on :5000 (handling websocket upgrades).
#
# CloudFront behaviors route /api/* and /socket.io/* to this origin; everything
# else is served from the S3 frontend bucket. (Prefer an ALB + ACM cert in front
# of this instance so CloudFront→origin is HTTPS — see deploy/PRODUCTION.md.)
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/somhr
#   sudo ln -sf /etc/nginx/sites-available/somhr /etc/nginx/sites-enabled/somhr
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;   # logo / document uploads

    # health check for ALB / CloudFront origin monitoring
    location = /healthz {
        proxy_pass http://127.0.0.1:5000/health;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
