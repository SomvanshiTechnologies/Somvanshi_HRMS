# SomHR — Nginx site config
# Serves the built Vite SPA and reverse-proxies the API + Socket.IO to the
# Node backend on the same origin (no CORS needed).
#
# Install on the server:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/somhr
#   sudo ln -sf /etc/nginx/sites-available/somhr /etc/nginx/sites-enabled/somhr
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add HTTPS:  sudo certbot --nginx -d hr.yourdomain.com
# (Certbot rewrites this file to listen on 443 and auto-renews.)

server {
    listen 80;
    server_name hr.yourdomain.com;   # <-- change to your domain

    root /home/ubuntu/app/frontend/dist;
    index index.html;

    # allow logo / document / letterhead uploads
    client_max_body_size 25M;

    # SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (websocket upgrade) -> Node backend
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
