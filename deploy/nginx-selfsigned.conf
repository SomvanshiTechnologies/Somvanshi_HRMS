# SomHR — single-box Nginx with a SELF-SIGNED TLS cert (bare-IP test, no domain).
# Gives a real https:// secure context (so crypto.randomUUID + Secure cookies
# work) at the cost of a one-time browser "not private" warning.
#
# 1) generate the self-signed cert (CN can be the IP):
#    sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#      -keyout /etc/ssl/private/somhr-selfsigned.key \
#      -out /etc/ssl/certs/somhr-selfsigned.crt -subj "/CN=somhr"
# 2) install this config:
#    sudo cp deploy/nginx-selfsigned.conf /etc/nginx/sites-available/somhr
#    sudo ln -sf /etc/nginx/sites-available/somhr /etc/nginx/sites-enabled/somhr
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx

# redirect all HTTP to HTTPS
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/certs/somhr-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/somhr-selfsigned.key;

    root /home/ubuntu/app/frontend/dist;
    index index.html;
    client_max_body_size 25M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
