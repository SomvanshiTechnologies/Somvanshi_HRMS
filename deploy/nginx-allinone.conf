# SomHR — single-box (all-in-one) Nginx config.
# Serves the built React SPA from frontend/dist AND reverse-proxies the API +
# Socket.IO to the Node process on :5000. Use this when the whole app runs on
# one EC2 instance (no CloudFront / no separate S3 frontend).
#
# Install:
#   sudo cp deploy/nginx-allinone.conf /etc/nginx/sites-available/somhr
#   sudo ln -sf /etc/nginx/sites-available/somhr /etc/nginx/sites-enabled/somhr
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS later (free, no domain): point a DuckDNS subdomain at this server,
# set server_name to it, then:  sudo certbot --nginx -d <name>.duckdns.org

server {
    listen 80 default_server;
    server_name _;

    root /home/ubuntu/app/frontend/dist;
    index index.html;
    client_max_body_size 25M;

    # SPA — client-side routing falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> Node
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (websocket upgrade) -> Node
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
