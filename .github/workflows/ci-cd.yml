name: CI/CD

# Push to main → lint → typecheck → test → build → deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────── CI: lint, typecheck, test, build ─────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ---- backend ----
      - name: Backend install
        working-directory: backend
        run: npm ci

      - name: Backend prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Backend typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Backend test
        working-directory: backend
        run: npm test

      - name: Backend build
        working-directory: backend
        run: npm run build

      # ---- frontend ----
      - name: Frontend install
        working-directory: frontend
        run: npm ci

      # Advisory: the codebase currently has known lint findings (mostly the new
      # react-hooks/set-state-in-effect rule). Lint runs and reports on every push
      # but does not block deploys yet — typecheck + build are the hard gates.
      # TODO: drive these to zero, then remove continue-on-error.
      - name: Frontend lint (advisory)
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Frontend build (typecheck + bundle)
        working-directory: frontend
        run: npm run build
        env:
          # only needed if the API is on a separate origin; harmless when unset
          VITE_API_URL: ${{ vars.VITE_API_URL }}

  # ───────────────────────── Deploy (main only) ─────────────────────────
  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # for AWS OIDC role assumption
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ---- frontend → S3 + CloudFront ----
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy frontend
        run: ./deploy/frontend.sh deploy
        env:
          S3_FRONTEND_BUCKET: ${{ secrets.S3_FRONTEND_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

      # ---- backend → EC2 over SSH (pull, build, migrate, restart) ----
      - name: Deploy backend (EC2)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            ./deploy/backend.sh deploy
