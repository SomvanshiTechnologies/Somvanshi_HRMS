# ──────────────────────────────────────────────────────────────────────────────
# Somvanshi HRMS — full stack (MySQL · Redis · Backend API · Frontend/Nginx)
# Usage:
#   cp .env.example .env   &&   edit secrets
#   docker compose up -d --build
#   docker compose run --rm backend npx prisma db seed   # first boot only (bootstrap config + admin)
# App: http://localhost  ·  API: http://localhost/api/v1
# ──────────────────────────────────────────────────────────────────────────────
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-somhr}
      MYSQL_USER: ${MYSQL_USER:-somhr}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --default-authentication-plugin=caching_sha2_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: "mysql://${MYSQL_USER:-somhr}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-somhr}"
      REDIS_URL: "redis://redis:6379"
      REDIS_ENABLED: "true"
      CORS_ORIGIN: ${APP_URL:-http://localhost}
      APP_URL: ${APP_URL:-http://localhost}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-SomHR <no-reply@somvanshitech.com>}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_DIR: /uploads
      S3_REGION: ${S3_REGION:-ap-south-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - uploads_data:/uploads
    expose:
      - "5000"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
  uploads_data:
